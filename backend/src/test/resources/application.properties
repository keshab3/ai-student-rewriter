spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

spring.datasource.url=jdbc:h2:mem:rewriting_tool;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

logging.level.root=WARN

app.admin.username=admin
app.admin.password=admin123
app.user.username=student
app.user.password=student123

openai.api-key=
openai.model=gpt-5.6-luna
openai.base-url=https://api.openai.com/v1
datamuse.enabled=false
datamuse.api-url=https://api.datamuse.com/words
