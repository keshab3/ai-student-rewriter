spring.application.name=rewriting_tool
spring.config.import=optional:file:.env[.properties]
server.port=8080
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# MySQL connection
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rewriting_tool?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.edu.kcg=DEBUG
logging.file.name=logs/rewriting-tool.log

# Frontend CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Login seed users
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.user.username=${USER_USERNAME:student}
app.user.password=${USER_PASSWORD:student123}

# OpenAI
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-5.6-luna}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

# Datamuse vocabulary suggestions
datamuse.enabled=${DATAMUSE_ENABLED:true}
datamuse.api-url=${DATAMUSE_API_URL:https://api.datamuse.com/words}
