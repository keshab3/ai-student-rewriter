services:
  mysql:
    image: mysql:8.4
    container_name: ai-writing-kotlin-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: rewriting_tool
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ai-writing-kotlin:backend
    container_name: ai-writing-kotlin-backend
    restart: unless-stopped
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:mysql://mysql:3306/rewriting_tool?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_BASE_URL: https://api.openai.com/v1
      DATAMUSE_ENABLED: "true"
      DATAMUSE_API_URL: https://api.datamuse.com/words
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      USER_USERNAME: ${USER_USERNAME:-student}
      USER_PASSWORD: ${USER_PASSWORD:-student123}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: ai-writing-kotlin:frontend
    container_name: ai-writing-kotlin-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql-data:
